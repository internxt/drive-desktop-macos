name: Internxt Desktop Unit Tests

on: [push]

jobs:
  tests:
    runs-on: macos-latest
    steps:
      - uses: swift-actions/setup-swift@v1
        with:
          swift-version: "5"
      - uses: actions/checkout@v3
      - name: Build and Test
        run: |
         xcodebuild test -scheme InternxtDesktop -destination 'platform=macOS'
